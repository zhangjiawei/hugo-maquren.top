baseURL = 'https://maquren.top/'
languageCode = 'zh-cn'
title = 'maquren(码趣人) - 有趣的编码世界'
theme = 'PaperMod'
paginate = 10

[params]
  defaultTheme = 'dark'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true

  # 这里以后会配置 Giscus 评论，先占位
  comments = true

  [params.author]
    name = 'maquren'
    email = 'zhangjiawei@maquren.top'

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 1

  [[menu.main]]
    identifier = 'about'
    name = '关于'
    url = '/about/'
    weight = 2

[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'
