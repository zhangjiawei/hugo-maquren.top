baseURL = 'https://maquren.top/'
languageCode = 'zh-cn'
title = 'maquren(码趣人) - 有趣的编码世界'
theme = 'PaperMod'
paginate = 10
enableRobotsTXT = true

[sitemap]
  changefreq = 'daily'
  filename = 'sitemap.xml'
  priority = 0.5

[outputs]
  home = ['HTML', 'RSS', 'JSON']

[related]
  includeNewer = true
  threshold = 80
  toLower = false
  [[related.indices]]
    name = 'tags'
    weight = 90
  [[related.indices]]
    name = 'categories'
    weight = 80
  [[related.indices]]
    name = 'keywords'
    weight = 70

[params]
  env = 'production'
  description = 'maquren(码趣人) 技术博客，聚焦 AI 编程、开发环境搭建、OpenWrt 路由改造、Cloudflare 免费建站等实战教程。'
  keywords = ['AI 编程', '开发环境搭建', 'OpenWrt', 'Cloudflare', 'Hugo', '鼠须管', '万象拼音']
  images = ['/img/og-cover.png']
  defaultTheme = 'dark'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  TocOpen = false

  # 这里以后会配置 Giscus 评论，先占位
  comments = true

  [params.author]
    name = 'maquren'
    email = 'zhangjiawei@maquren.top'

  [params.utterances]
    enabled = true
    repo = 'zhangjiawei/hugo-maquren.top'
    issueTerm = 'pathname'
    label = 'comment'
    theme = 'github-dark'
    crossorigin = 'anonymous'

  [params.webmaster]
    google = ''
    bing = ''
    baidu = ''

[menu]
  [[menu.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 1

  [[menu.main]]
    identifier = 'about'
    name = '关于'
    url = '/about/'
    weight = 2

  [[menu.main]]
    identifier = 'topics'
    name = '专题'
    url = '/topics/'
    weight = 3

  [[menu.main]]
    identifier = 'seo'
    name = '收录监控'
    url = '/seo/'
    weight = 4

[taxonomies]
  category = 'categories'
  tag = 'tags'
  series = 'series'
