baseURL: "https://maquren.top/"
title: "maquren · 技术与环境搭建"
theme: "PaperMod"
languageCode: "zh-cn"
paginate: 10

params:
  defaultTheme: auto
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowRssButtonInSectionTermList: true

  # 这里以后会配置 Giscus 评论，先占位
  comments: true

menu:
  main:
    - identifier: posts
      name: 文章
      url: /posts/
      weight: 1
    - identifier: about
      name: 关于
      url: /about/
      weight: 2

taxonomies:
  category: categories
  tag: tags
  series: series
